openapi: 3.1.0
info:
  title: CAPT Observatory Gateway
  version: 0.2.0
  description: Bounded, evidence-oriented API between CAPT runtime sources and the self-hosted dashboard.
servers:
  - url: /api/v1
paths:
  /snapshot:
    get:
      summary: Return the current normalized cognitive snapshot
      responses:
        '200':
          description: Current bounded snapshot
          content:
            application/json:
              schema:
                type: object
                required: [schemaVersion, snapshotId, generatedAt, freshness, provenance, metrics, pipeline]
                properties:
                  schemaVersion: { type: string }
                  snapshotId: { type: string }
                  generatedAt: { type: string, format: date-time }
                  freshness:
                    type: object
                    required: [state, observedAt]
                    properties:
                      state: { type: string, enum: [live, delayed, stale, partial, offline, error] }
                      observedAt: { type: string, format: date-time }
                      expectedCadenceMs: { type: integer, minimum: 1 }
                  provenance:
                    type: object
                    required: [source, simulated, schemaVersion]
                    properties:
                      source: { type: string }
                      simulated: { type: boolean }
                      schemaVersion: { type: string }
                      instanceId: { type: string }
                  metrics:
                    type: object
                    additionalProperties: { type: number }
                  pipeline:
                    type: array
                    maxItems: 64
                    items:
                      $ref: '#/components/schemas/PipelineStageTelemetry'
  /events:
    get:
      summary: Page through normalized append-only observatory events
      parameters:
        - in: query
          name: after
          schema: { type: integer, minimum: 0 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Bounded event page
  /events/stream:
    get:
      summary: Stream a bounded replay followed by heartbeat events using SSE
      responses:
        '200':
          description: text/event-stream response
  /traces/{traceId}:
    get:
      summary: Return normalized evidence spans for one trace
      parameters:
        - in: path
          name: traceId
          required: true
          schema: { type: string, maxLength: 160 }
      responses:
        '200': { description: Trace evidence }
        '404': { description: Unknown trace }
  /interventions/preview:
    post:
      summary: Preview a governed intervention without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, minLength: 3, maxLength: 120 }
                target: { type: [string, 'null'], maxLength: 160 }
      responses:
        '201': { description: Short-lived preview and confirmation token }
        '413': { description: Payload too large }
        '422': { description: Invalid action }
  /interventions/confirm:
    post:
      summary: Consume a short-lived preview token and produce an audit receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [previewToken]
              properties:
                previewToken: { type: string }
      responses:
        '200': { description: Simulated or executed receipt }
        '409': { description: Token invalid, expired, reused, or state changed }
  /audit:
    get:
      summary: Return the bounded tail of hash-chained gateway audit records
      responses:
        '200': { description: Audit record page }
components:
  schemas:
    PipelineStageTelemetry:
      type: object
      additionalProperties: false
      required: [id, label, health, latencyMs, throughputPerMinute, confidence, queueDepth, detail, provenance]
      properties:
        id: { type: string, minLength: 1, maxLength: 80 }
        label: { type: string, minLength: 1, maxLength: 120 }
        health: { type: string, enum: [healthy, warning, critical, offline] }
        latencyMs: { type: number, minimum: 0 }
        throughputPerMinute: { type: [number, 'null'], minimum: 0 }
        confidence: { type: number, minimum: 0, maximum: 100 }
        queueDepth: { type: integer, minimum: 0 }
        detail: { type: string, maxLength: 500 }
        provenance:
          type: object
          required: [source, simulated, schemaVersion]
          properties:
            source: { type: string }
            simulated: { type: boolean }
            schemaVersion: { type: string }
