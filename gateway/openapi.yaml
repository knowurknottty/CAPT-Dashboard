openapi: 3.1.0
info:
  title: CAPT Observatory Gateway
  version: 0.1.0
  description: Bounded, evidence-oriented API between CAPT runtime sources and the self-hosted dashboard.
servers:
  - url: /api/v1
paths:
  /snapshot:
    get:
      summary: Return the current normalized cognitive snapshot
      responses:
        '200':
          description: Current bounded snapshot
  /events:
    get:
      summary: Page through normalized append-only observatory events
      parameters:
        - in: query
          name: after
          schema: { type: integer, minimum: 0 }
        - in: query
          name: limit
          schema: { type: integer, minimum: 1, maximum: 200 }
      responses:
        '200':
          description: Bounded event page
  /events/stream:
    get:
      summary: Stream a bounded replay followed by heartbeat events using SSE
      responses:
        '200':
          description: text/event-stream response
  /traces/{traceId}:
    get:
      summary: Return normalized evidence spans for one trace
      parameters:
        - in: path
          name: traceId
          required: true
          schema: { type: string, maxLength: 160 }
      responses:
        '200': { description: Trace evidence }
        '404': { description: Unknown trace }
  /interventions/preview:
    post:
      summary: Preview a governed intervention without executing it
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [action]
              properties:
                action: { type: string, minLength: 3, maxLength: 120 }
                target: { type: [string, 'null'], maxLength: 160 }
      responses:
        '201': { description: Short-lived preview and confirmation token }
        '413': { description: Payload too large }
        '422': { description: Invalid action }
  /interventions/confirm:
    post:
      summary: Consume a short-lived preview token and produce an audit receipt
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [previewToken]
              properties:
                previewToken: { type: string }
      responses:
        '200': { description: Simulated or executed receipt }
        '409': { description: Token invalid, expired, reused, or state changed }
  /audit:
    get:
      summary: Return the bounded tail of hash-chained gateway audit records
      responses:
        '200': { description: Audit record page }
