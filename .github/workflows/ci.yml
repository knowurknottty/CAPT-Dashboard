name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm install --no-audit --no-fund
      - run: npm run check
      - run: npm run build
      - run: npm --prefix gateway test
      - run: docker compose config
      - run: docker build -t capt-dashboard-ci .
      - run: docker build -t capt-observatory-gateway-ci ./gateway
